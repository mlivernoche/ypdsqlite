name: Build and Upload Binary

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
      - run: dotnet publish "JsonToSqlite/src/JsonToSqlite/JsonToSqlite.csproj" -c Release -r linux-x64 --self-contained true -o ./publish
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: JsonToSqlite
          path: ./publish/
