name: Scheduled Task

on:
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  run-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
      - run: |
          curl https://db.ygoprodeck.com/api/v7/cardinfo.php -o cardinfo.json
          dotnet run "cardinfo.json" --project JsonToSqlite/src/JsonToSqlite
          mkdir -p release
          mv cards.db ./release
      - uses: elgohr/Github-Release-Action@v5
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          title: "Cards Database"
          tag: ${{ github.ref_name }}
          workdir: release
