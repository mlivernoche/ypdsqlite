name: Scheduled Task

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  run-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: JsonToSqlite
          path: ./app
      - run: |
          chmod +x ./app/JsonToSqlite
          curl https://db.ygoprodeck.com/api/v7/cardinfo.php -o cardinfo.json
          ./app/JsonToSqlite "cardinfo.json"
          mv ./app/cards.db ./release
      - uses: elgohr/Github-Release-Action@v5
        with:
          title: "Cards Database"
          tag: ${{ github.ref_name }}
          workdir: release
      
